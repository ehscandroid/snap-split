document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lay:inline-flex; align-items:center; justify-content:center; flex:0 0 20px;\"><\u002Fspan>\n          <span style=\"font-size:14px; color:#334155; font-weight:500;\">Mark this page as done<\u002Fspan>\n        <\u002Flabel>\n\n        <!-- Attachments card -->\n        <div style=\"display:flex; flex-direction:column; gap:7px;\">\n          <label style=\"font-size:13px; font-weight:600; color:#334155;\">Attachments<\u002Flabel>\n          <div style=\"border:1px solid #e8ecf2; border-radius:13px; overflow:hidden; background:#fff; box-shadow:0 1px 2px rgba(15,23,42,0.04);\">\n            <!-- card header -->\n            <div style=\"display:flex; align-items:center; gap:10px; padding:12px 15px; background:#fafbfc; border-bottom:1px solid #eef1f5;\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49\"><\u002Fpath><\u002Fsvg>\n              <span style=\"flex:1; font-size:13.5px; font-weight:600; color:#334155;\">4 files<\u002Fspan>\n              <button onclick=\"{{ toggleAll }}\" style=\"border:none; background:transparent; color:var(--accent); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; padding:4px 6px; border-radius:7px;\" style-hover=\"background:var(--accent-soft);\">{{ expandLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n            <!-- file rows -->\n            <sc-for list=\"{{ files }}\" as=\"file\" hint-placeholder-count=\"4\">\n              <div style=\"border-bottom:1px solid #f4f6f9;\">\n                <div onclick=\"{{ file.onToggle }}\" style=\"display:flex; align-items:center; gap:13px; padding:12px 15px; cursor:pointer;\" style-hover=\"background:#f9fbfd;\">\n                  <span style=\"{{ file.badgeStyle }}\">{{ file.type }}<\u002Fspan>\n                  <div style=\"flex:1; min-width:0;\">\n                    <div style=\"font-size:14px; font-weight:600; color:#1e293b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ file.name }}<\u002Fdiv>\n                    <div style=\"font-size:12.5px; color:#64748b; margin-top:2px;\">{{ file.size }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"{{ file.chevStyle }}\">\n                    <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fspan>\n                <\u002Fdiv>\n                <sc-if value=\"{{ file.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"padding:2px 15px 16px 66px;\">\n                    <div style=\"background:#f8fafc; border:1px solid #eef1f5; border-radius:10px; padding:13px 15px;\">\n                      <div style=\"display:flex; gap:28px; margin-bottom:10px;\">\n                        <div>\n                          <div style=\"font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#64748b;\">Uploaded<\u002Fdiv>\n                          <div style=\"font-size:13.5px; color:#334155; font-weight:500; margin-top:3px;\">{{ file.date }}<\u002Fdiv>\n                        <\u002Fdiv>\n                        <div>\n                          <div style=\"font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#64748b;\">By<\u002Fdiv>\n                          <div style=\"font-size:13.5px; color:#334155; font-weight:500; margin-top:3px;\">{{ file.by }}<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <p style=\"margin:0 0 13px 0; font-size:13.5px; line-height:1.55; color:#64748b;\">{{ file.note }}<\u002Fp>\n                      <div style=\"display:flex; gap:9px;\">\n                        <button style=\"display:flex; align-items:center; gap:7px; border:1px solid #e2e7ee; background:#fff; color:#334155; font-size:13px; font-weight:600; padding:7px 13px; border-radius:9px; cursor:pointer; font-family:inherit; box-shadow:0 1px 2px rgba(15,23,42,0.04);\" style-hover=\"background:#f8fafc;\">\n                          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"M7 11l5 5 5-5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n                          Download\n                        <\u002Fbutton>\n                        <button style=\"display:flex; align-items:center; gap:7px; border:1px solid #fbdfe3; background:#fff; color:#dc2626; font-size:13px; font-weight:600; padding:7px 13px; border-radius:9px; cursor:pointer; font-family:inherit; box-shadow:0 1px 2px rgba(15,23,42,0.04);\" style-hover=\"background:#fdf0f1;\">\n                          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7h16\"><\u002Fpath><path d=\"M9 7V4h6v3\"><\u002Fpath><path d=\"M6 7l1 13h10l1-13\"><\u002Fpath><\u002Fsvg>\n                          Remove\n                        <\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <!-- upload zone -->\n            <div style=\"display:flex; align-items:center; justify-content:center; gap:9px; padding:14px; cursor:pointer; color:#64748b;\" style-hover=\"background:#f9fbfd; color:var(--accent);\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14\"><\u002Fpath><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:13.5px; font-weight:600;\">Add file<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1860,&quot;height&quot;:960},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563eb&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Comfortable&quot;,&quot;Compact&quot;],&quot;default&quot;:&quot;Comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;radius&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:16,&quot;min&quot;:6,&quot;max&quot;:24,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { open: { f1: true } };\n\n  toggleFile(id) {\n    this.setState(s => ({ open: { ...s.open, [id]: !s.open[id] } }));\n  }\n\n  renderVals() {\n    const accent = this.props.accent ?? '#2563eb';\n    const density = this.props.density ?? 'Comfortable';\n    const radius = this.props.radius ?? 16;\n    const rowpad = density === 'Compact' ? '9px' : '15px';\n\n    const rootStyle = {\n      fontFamily: '\"SF Pro Display\", system-ui, -apple-system, \"Segoe UI\", Helvetica, sans-serif',\n      WebkitFontSmoothing: 'antialiased',\n      background: '#eaedf1',\n      minHeight: '100vh',\n      color: '#1e293b',\n      '--accent': accent,\n      '--accent-soft': accent + '33',\n      '--radius': radius + 'px',\n      '--rowpad': rowpad,\n    };\n\n    const favorites = [\n      { name: 'Q3 Planning Doc', tag: 'Form' },\n      { name: 'Design System v2', tag: 'Buttons' },\n      { name: 'User Research Notes', tag: 'Form' },\n      { name: 'Sprint Board', tag: 'Home' },\n    ];\n\n    const titles = [\n      'delectus aut autem', 'quis ut nam facilis et officia qui', 'fugiat veniam minus',\n      'et porro tempora', 'laboriosam mollitia et enim quasi adipisci quia harum',\n      'qui ullam ratione quibusdam voluptatem quia', 'illo expedita consequatur quia in',\n      'quo adipisci enim quam ut ab', 'molestiae perspiciatis ipsa',\n      'illo est ratione doloremque quia maiores aut', 'vero rerum temporibus dolor',\n      'ipsa repellendus fugit nisi', 'et doloremque nulla',\n      'repellendus sunt dolores architecto voluptatum', 'ab voluptatem amet voluptas',\n      'accusamus eos facilis sint et aut voluptatem', 'quo laboriosam deleniti aut qui',\n      'dolorum est consequatur ea mollitia', 'molestiae ipsa aut voluptatibus pariatur',\n      'eum ipsa maxime ut nihil', 'et eos aliquid rerum ut animi',\n      'enim quo cumque', 'sunt qui excepturi placeat culpa',\n      'nostrum quis quasi placeat', 'porro magni similique',\n      'in quibusdam tempore odit est dolorem', 'dolores quis dignissimos',\n      'qui explicabo molestiae dolorem', 'magnam ut rerum iure',\n      'id nihil reprehenderit', 'quaerat velit veniam amet cupiditate',\n      'eligendi animi quia eos', 'optio molestias id quia eum',\n      'omnis laborum odio', 'illo minus aliquam voluptatem',\n      'asperiores nam sint', 'dignissimos aperiam dolorem qui eum',\n    ];\n\n    const statuses = ['In Progress', 'Done', 'Cancelled', 'Open'];\n    const tones = {\n      'In Progress': { background: '#fdf3e3', color: '#b45309' },\n      'Done':        { background: '#e6f6ec', color: '#15803d' },\n      'Cancelled':   { background: '#fdebec', color: '#dc2626' },\n      'Open':        { background: '#e8f0fe', color: '#2563eb' },\n    };\n    const pillBase = {\n      display: 'inline-flex', alignItems: 'center',\n      padding: '3px 11px', borderRadius: '7px',\n      fontSize: '12px', fontWeight: 600, lineHeight: 1.45,\n    };\n\n    const items = titles.map((title, i) => {\n      const status = statuses[(i * 3 + 1) % statuses.length];\n      const done = (i % 3 === 0 || i % 5 === 0) ? 'Yes' : 'No';\n      const selected = i === 0;\n      return {\n        title,\n        status,\n        id: '#' + (i + 1),\n        done,\n        checked: selected,\n        statusStyle: { ...pillBase, ...tones[status] },\n        rowStyle: {\n          display: 'grid', gridTemplateColumns: '42px 1fr 122px 52px 64px',\n          alignItems: 'center', padding: 'var(--rowpad) 20px',\n          borderBottom: '1px solid #f4f6f9', cursor: 'pointer',\n          background: selected ? 'var(--accent-soft)' : 'transparent',\n          boxShadow: selected ? 'inset 3px 0 0 var(--accent)' : 'none',\n        },\n        titleStyle: {\n          fontSize: '14px', fontWeight: selected ? 600 : 500,\n          color: selected ? '#0f172a' : '#1e293b', lineHeight: 1.4,\n          paddingRight: '14px', display: '-webkit-box',\n          WebkitBoxOrient: 'vertical', WebkitLineClamp: 2, overflow: 'hidden',\n        },\n        checkStyle: {\n          width: '20px', height: '20px', borderRadius: '6px',\n          flex: '0 0 20px', display: 'inline-flex',\n          alignItems: 'center', justifyContent: 'center',\n          border: selected ? '1.5px solid var(--accent)' : '1.5px solid #cbd5e1',\n          background: selected ? 'var(--accent)' : '#fff',\n        },\n        doneStyle: {\n          fontSize: '13px', fontWeight: 600,\n          color: done === 'Yes' ? '#15803d' : '#64748b',\n        },\n      };\n    });\n\n    // ---- attachments ----\n    const fileTones = {\n      PDF:  { background: '#fdebec', color: '#dc2626' },\n      JSON: { background: '#fdf3e3', color: '#b45309' },\n      IMG:  { background: '#ecebfd', color: '#6d4ad6' },\n      DOC:  { background: '#e8f0fe', color: '#2563eb' },\n    };\n    const rawFiles = [\n      { id: 'f1', name: 'Q3-budget-final.pdf', type: 'PDF', size: '2.4 MB', date: 'Jun 14, 2026', by: 'Anna Keller', note: 'Final approved budget for the Q3 planning cycle, including revised headcount.' },\n      { id: 'f2', name: 'design-tokens.json', type: 'JSON', size: '18 KB', date: 'Jun 12, 2026', by: 'Marco Vise', note: 'Exported color, spacing and radius tokens from Design System v2.' },\n      { id: 'f3', name: 'hero-mockup.png', type: 'IMG', size: '854 KB', date: 'Jun 10, 2026', by: 'Lena Roth', note: 'High-fidelity hero mockup for the landing page refresh.' },\n      { id: 'f4', name: 'meeting-notes.docx', type: 'DOC', size: '42 KB', date: 'Jun 9, 2026', by: 'Anna Keller', note: 'Notes and action items from the sprint kickoff.' },\n    ];\n    const open = this.state.open;\n    const files = rawFiles.map(f => ({\n      ...f,\n      isOpen: !!open[f.id],\n      badgeStyle: {\n        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',\n        width: '38px', height: '38px', borderRadius: '9px',\n        fontSize: '10.5px', fontWeight: 700, letterSpacing: '0.02em',\n        ...fileTones[f.type],\n      },\n      chevStyle: {\n        display: 'flex', color: '#9aa5b3',\n        transform: open[f.id] ? 'rotate(180deg)' : 'rotate(0deg)',\n        transition: 'transform 0.18s ease',\n      },\n      onToggle: () => this.toggleFile(f.id),\n    }));\n    const allOpen = rawFiles.every(f => open[f.id]);\n    const toggleAll = () => {\n      const next = {};\n      rawFiles.forEach(f => { next[f.id] = !allOpen; });\n      this.setState({ open: next });\n    };\n\n    const statusOptions = ['In Progress', 'Done', 'Cancelled', 'Open'];\n\n    return { rootStyle, favorites, items, files, allOpen, toggleAll, statusOptions, expandLabel: allOpen ? 'Collapse all' : 'Expand all' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
